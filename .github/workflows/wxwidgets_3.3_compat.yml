# wxWidgets 3.3.x Compatibility Testing
# Tests wxUI specifically against wxWidgets 3.3.x versions, and provides a dedicated badge for 3.3.x compatibility
# This means we run when a new tag is pushed, and regularly to make sure we're still compatible.

name: wxWidgets 3.3.x Compatibility

on:
  push:
    tags:
      - 'v*'
  schedule:
    # Run weekly on Mondays at 02:00 UTC (offset from main compat test)
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  test-3-3-x:
    name: wxWidgets 3.3.x Tests
    uses: ./.github/workflows/wxwidgets_compat_reusable.yml
    with:
      wxwidgets_versions: '["v3.3.2"]'
      workflow_name: 'wxWidgets 3.3.x Compatibility'
