# Reusable wxWidgets Compatibility Testing Workflow
# This workflow can be called by other workflows to test specific wxWidgets versions
# Used by: wxwidgets_compatibility.yml, wxwidgets_3.2_compat.yml, etc.

name: wxWidgets Compatibility Test (Reusable)

on:
  workflow_call:
    inputs:
      wxwidgets_versions:
        description: 'Comma-separated list of wxWidgets versions to test'
        required: true
        type: string
      os:
        description: 'JSON array of OS to test: ["ubuntu", "macos", "windows"]'
        required: false
        type: string
        default: '["ubuntu", "macos", "windows"]'
      workflow_name:
        description: 'Name to display in test results'
        required: false
        type: string
        default: 'Compatibility Test'

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Generate matrix
        id: set-matrix
        run: |
          # Parse inputs
          wxwidgets_versions='${{ inputs.wxwidgets_versions }}'
          os_list='${{ inputs.os }}'
          
          # Build matrix JSON
          matrix='{"include":[]}'
          
          for wx_version in $(echo "$wxwidgets_versions" | jq -r '.[]'); do
            for os_name in $(echo "$os_list" | jq -r '.[]'); do
              case "$os_name" in
                ubuntu)
                  os="ubuntu-latest"
                  name="Ubuntu GCC"
                  ;;
                macos)
                  os="macos-latest"
                  name="macOS Clang"
                  ;;
                windows)
                  os="windows-latest"
                  name="Windows MSVC"
                  ;;
              esac
              
              matrix=$(echo "$matrix" | jq -c --arg wx "$wx_version" --arg os "$os" --arg name "$name" \
                '.include += [{"wxwidgets-version": $wx, "os": $os, "name": $name, "build_type": "Release"}]')
            done
          done
          
          # Output as compact JSON (single line)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Generated matrix:"
          echo "$matrix" | jq .
  
  compatibility-test:
    needs: generate-matrix
    name: ${{ matrix.name }} - ${{ matrix.wxwidgets-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Checkout wxUI
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev freeglut3-dev \
            libgl1-mesa-dev libglu1-mesa-dev xvfb
          gcc --version
          g++ --version

      - name: Setup build environment (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          clang --version

      - name: Setup build environment (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          echo "Visual Studio environment:"
          where cl

      - name: Cache wxWidgets build
        id: cache-wxwidgets
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/wxwidgets-install
          key: wxwidgets-${{ matrix.os }}-${{ matrix.wxwidgets-version }}-${{ matrix.build_type }}-v2
          restore-keys: |
            wxwidgets-${{ matrix.os }}-${{ matrix.wxwidgets-version }}-

      - name: Configure CMake
        run: |
          cmake -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DWXUI_WITH_TESTS=ON -DWXUI_WITH_EXAMPLE=ON -DWXUI_FETCH_WXWIDGETS=ON -DWXUI_WXWIDGETS_GIT_TAG="${{ matrix.wxwidgets-version }}" -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/wxwidgets-install

      - name: Build
        run: |
          # Limit parallel jobs on Linux to avoid OOM issues
          if [ "$RUNNER_OS" == "Linux" ]; then
            cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --parallel 2
          else
            cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }} --parallel
          fi
        shell: bash

      - name: Run tests
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            xvfb-run -a ctest --test-dir "${{ github.workspace }}/build" -C ${{ matrix.build_type }} --output-on-failure
          elif [ "$RUNNER_OS" == "Windows" ]; then
            cd "${{ github.workspace }}/build" && ctest -C ${{ matrix.build_type }} --output-on-failure --timeout 30
          else
            ctest --test-dir "${{ github.workspace }}/build" -C ${{ matrix.build_type }} --output-on-failure
          fi
        shell: bash
        env:
          LSAN_OPTIONS: suppressions=${{ github.workspace }}/tests/lsan.supp

      - name: Output test log on failure
        if: failure()
        run: |
          if [ -f "${{ github.workspace }}/build/Testing/Temporary/LastTest.log" ]; then
            cat "${{ github.workspace }}/build/Testing/Temporary/LastTest.log"
          else
            echo "Test log not found"
          fi
        shell: bash

      - name: Generate test report
        if: always()
        run: |
          mkdir -p ${{ github.workspace }}/test-reports
          
          # Get wxUI version
          WXUI_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          
          # Create a simple JSON report
          cat > ${{ github.workspace }}/test-reports/result.json << EOF
          {
            "wxui_version": "$WXUI_VERSION",
            "wxwidgets_version": "${{ matrix.wxwidgets-version }}",
            "platform": "${{ matrix.name }}",
            "os": "${{ matrix.os }}",
            "build_type": "${{ matrix.build_type }}",
            "status": "${{ job.status }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow": "${{ inputs.workflow_name }}"
          }
          EOF
          
          cat ${{ github.workspace }}/test-reports/result.json
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.wxwidgets-version }}
          path: ${{ github.workspace }}/test-reports/
          retention-days: 90

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [compatibility-test]
    if: always()
    steps:
      - name: Check if all tests passed
        run: |
          if [ "${{ needs.compatibility-test.result }}" != "success" ]; then
            echo "⚠️ Some compatibility tests failed or were cancelled"
            echo "Check the detailed results above for more information"
            exit 1
          else
            echo "✅ All compatibility tests passed for: ${{ inputs.workflow_name }}"
          fi
