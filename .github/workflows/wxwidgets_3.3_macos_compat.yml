# wxWidgets 3.3.x MacOS Compatibility Testing

name: wxWidgets 3.3.x MacOS

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'test-compat-*'  # Allow testing on branches named test-compat-*
  schedule:
    # Run weekly on Mondays at 02:00 UTC (offset from main compat test)
    - cron: '0 4 * * 1'
  workflow_dispatch:

jobs:
  test-3-3-x:
    name: wxWidgets 3.3.x Tests
    uses: ./.github/workflows/wxwidgets_compat_reusable.yml
    with:
      wxwidgets_versions: '["v3.3.2"]'
      os: '["macos"]'
      workflow_name: 'wxWidgets 3.3.x MacOS'
